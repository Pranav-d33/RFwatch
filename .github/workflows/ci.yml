name: CI

on:
  push:
    branches: [main, 'refactor/**', 'fix/**', 'feat/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # Core tests don't need GNU Radio or HackRF hardware
        pip install numpy PySide6 PyQt5 pyqtgraph pytest

    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check --output-format=github . || true

    - name: Test with pytest
      run: |
        python -m pytest tests/ -v

  package:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Python deps
      run: |
        python -m pip install --upgrade pip
        pip install numpy PySide6 PyQt5 pyqtgraph
    - name: Build package
      run: |
        python -m pip install --upgrade pip build
        python -m build
    - name: Install from built package
      run: |
        pip install dist/*.whl
        python -c "from core.detector import Detector; print('Import OK')"
