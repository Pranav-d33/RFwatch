name: CI

on:
  push:
    branches: [main, 'refactor/**', 'fix/**', 'feat/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          python3-pyside6.qtcore python3-pyside6.qtwidgets \
          python3-pyside6.qtgui python3-pyside6.qtopengl \
          libhackrf0

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy PySide6 PyQt5 pyqtgraph pytest ruff

    - name: Lint with ruff
      run: |
        ruff check --output-format=github .

    - name: Test with pytest
      run: |
        python -m pytest tests/ -v --timeout=30

  package:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install system deps
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          python3-pyside6.qtcore python3-pyside6.qtwidgets \
          python3-pyside6.qtgui python3-pyside6.qtopengl
    - name: Build package
      run: |
        python -m pip install --upgrade pip build
        python -m build
    - name: Install from built package
      run: |
        pip install dist/*.whl
        python -c "from core.detector import Detector; print('Import OK')"
